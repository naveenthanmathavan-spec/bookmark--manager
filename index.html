<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🔖 Bookmark Manager</h1>
            <p class="subtitle">Save and organize your favorite websites</p>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="form-group">
                <label for="websiteName">Website Name</label>
                <input
                    type="text"
                    id="websiteName"
                    placeholder="e.g., Google, GitHub, Stack Overflow"
                    class="input-field"
                />
            </div>

            <div class="form-group">
                <label for="websiteURL">Website URL</label>
                <input
                    type="text"
                    id="websiteURL"
                    placeholder="e.g., https://www.example.com"
                    class="input-field"
                />
            </div>

            <button id="addBtn" class="btn btn-primary">+ Add Bookmark</button>

            <!-- Error Message Display -->
            <div id="errorMessage" class="error-message"></div>
        </section>

        <!-- Search Section -->
        <section class="search-section">
            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search bookmarks..."
                class="search-field"
            />
        </section>

        <!-- Bookmarks Display Section -->
        <section class="bookmarks-section">
            <div id="bookmarksContainer" class="bookmarks-container">
                <!-- Bookmarks will be dynamically inserted here -->
            </div>

            <!-- Empty State Message -->
            <div id="emptyMessage" class="empty-message">
                <p>📭 No bookmarks yet. Add one to get started!</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
